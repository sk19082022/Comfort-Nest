<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Call · Comfort Nest PG for Ladies</title>
  <!-- Google Font Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Header -->
  <header class="page-header">
    <div class="header-container">
      <a href="../index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
      <div class="header-brand">
        <i class="fas fa-home header-icon"></i>
        <span>Comfort Nest <span class="brand-orange">PG</span></span>
      </div>
    </div>
  </header>

  <!-- Main Card -->
  <div class="page-wrapper">
    <div class="glass-card">
      <div class="card-header">
        <div class="header-badge">
          <i class="fas fa-phone-alt"></i> Request a Call
        </div>
        <h1>We're Here to Help</h1>
        <p class="subtitle">Want to know more about Comfort Nest PG for Ladies? Fill out the form below and our team will contact you shortly.</p>
      </div>

      <form id="contactForm" novalidate>
        <div class="input-group">
          <label for="fullName">
            <i class="fas fa-user"></i> Full Name
          </label>
          <input 
            type="text" 
            id="fullName" 
            placeholder="Enter your full name" 
            autocomplete="name"
          />
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="input-group">
          <label for="phone">
            <i class="fas fa-phone"></i> Phone Number
          </label>
          <input 
            type="tel" 
            id="phone" 
            placeholder="Enter your phone number" 
            maxlength="10"
            inputmode="numeric"
            autocomplete="tel"
          />
          <div class="error-message" id="phoneError"></div>
        </div>

        <button type="submit" class="btn-primary" id="sendBtn">
          <span class="btn-text">Send Request</span>
          <span class="ripple"></span>
        </button>
      </form>

      <div class="footer-note">
        <i class="fas fa-shield-alt"></i>
        <span>Your information is safe with us</span>
      </div>
    </div>
  </div>

  <!-- Error Popup -->
  <div id="errorPopup" class="error-popup">
    <div class="error-popup-content">
      <div class="error-icon">
        <i class="fas fa-times"></i>
      </div>
      <h3>Submission Failed</h3>
      <p id="errorMessage">Something went wrong. Please try again.</p>
      <button id="errorCloseBtn" class="error-close-btn">Dismiss</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
