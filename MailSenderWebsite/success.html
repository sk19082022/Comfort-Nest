<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Success · Comfort Nest PG for Ladies</title>
  <!-- Google Font Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="success.css" />
</head>
<body>
  <!-- Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <canvas id="confettiCanvas"></canvas>

  <!-- Header -->
  <header class="page-header">
    <div class="header-container">
      <a href="../index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
      <div class="header-brand">
        <i class="fas fa-home header-icon"></i>
        <span>Comfort Nest <span class="brand-orange">PG</span></span>
      </div>
    </div>
  </header>

  <!-- Success Card -->
  <div class="page-wrapper">
    <div class="success-card">
      <div class="checkmark-wrapper">
        <div class="circle-bg">
          <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
          </svg>
        </div>
      </div>

      <div class="badge">Success</div>
      <h1>Thank You!</h1>
      <p class="sub-message">Your request has been submitted successfully.</p>
      <p class="contact-message">Our team will contact you shortly.</p>

      <a href="../index.html" class="btn-back" id="backBtn">
        <i class="fas fa-home"></i> Back to Home
      </a>

      <div class="countdown-wrapper">
        <i class="fas fa-clock"></i>
        <span id="countdownText">Redirecting in 10 seconds...</span>
      </div>
    </div>
  </div>

  <script src="success.js"></script>
</body>
</html>
